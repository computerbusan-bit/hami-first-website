name: Deploy Busan History (mini_sns)

on:
  push:
    branches: [main]
    paths:
      - 'lecture1/mini_sns/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: lecture1/mini_sns
        run: npm install

      - name: Build
        working-directory: lecture1/mini_sns
        env:
          VITE_SUPABASE_URL: https://vqrollmvvwfvtyyboywy.supabase.co
          VITE_SUPABASE_ANON_KEY: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZxcm9sbG12dndmdnR5eWJveXd5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIxMjUyMDMsImV4cCI6MjA5NzcwMTIwM30.-VFqORZNRQ6zwg_BCxNXOV9fzmmlsBV2zgqfcyWtgrw
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'lecture1/mini_sns/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
