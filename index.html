<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>안녕하세요, 저는 하미입니다</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif; background: #f0f4ff; color: #333; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
    .card { background: white; border-radius: 20px; padding: 48px 40px; max-width: 500px; width: 100%; text-align: center; box-shadow: 0 8px 32px rgba(99,102,241,.12); }
    .avatar { width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #6366f1, #a78bfa); display: flex; align-items: center; justify-content: center; font-size: 36px; margin: 0 auto 24px; }
    h1 { font-size: 1.8rem; margin-bottom: 8px; color: #1e1b4b; }
    .subtitle { font-size: 1rem; color: #6366f1; font-weight: 600; margin-bottom: 20px; }
    p { font-size: 0.95rem; line-height: 1.8; color: #555; margin-bottom: 28px; }
    .tag { display: inline-block; background: #ede9fe; color: #6366f1; border-radius: 20px; padding: 6px 16px; font-size: 0.85rem; margin: 4px; }
    .footer { margin-top: 32px; font-size: 0.8rem; color: #aaa; }
  </style>
</head>
<body>
  <div class="card">
    <div class="avatar">👋</div>
    <h1>안녕하세요, 하미입니다!</h1>
    <p class="subtitle">바이브 코딩을 배우는 중이에요</p>
    <p>웹 개발의 세계에 첫 발을 내딛었습니다.<br>작은 것부터 차근차근, 매일 성장하고 있어요.</p>
    <div>
      <span class="tag">HTML</span>
      <span class="tag">CSS</span>
      <span class="tag">JavaScript</span>
      <span class="tag">React</span>
    </div>
    <p class="footer">🚀 GitHub Pages로 배포된 나의 첫 웹사이트</p>
  </div>
</body>
</html>
